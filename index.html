<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NisanX Blog</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  
  <style>
    /* 3D background canvas full screen e rakhar jonno */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    
    /* content upore thakuk */
    header, main, #loadMore {
      position: relative;
      z-index: 1;
    }

   .modal {
      position: relative;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <header>
    <h2>NisanX Blog</h2>
    <div class="header-right">
      <button id="themeToggle">🌙</button>
      <input type="text" id="searchBox" placeholder="Search posts...">
      <button id="loginBtn">Login with Google</button>
      <button id="uploadBtn" style="display:none;">Upload</button>
      <button id="profileBtn" style="display:none;">Profile</button>
      <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </header>

  <div id="uploadModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Create Post</h3>
      <input type="text" id="postTitle" placeholder="Title">
      <div id="editor" style="height:200px;"></div>
      <input type="file" id="imageUpload" accept="image/*">
      <button id="submitPost">Post</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <main id="postsContainer"></main>
  <button id="loadMore" style="display:none;">Load More</button>

  <!-- Three.js import -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('bg-canvas'),
      alpha: true,
      antialias: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    camera.position.z = 5;

    // Floating particles banano
    const particleCount = 1500;
    const particlesGeometry = new THREE.BufferGeometry();
    const posArray = new Float32Array(particleCount * 3);

    for(let i = 0; i < particleCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 20;
    }

    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    
    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.02,
      color: 0x4da6ff,
      transparent: true,
      opacity: 0.8
    });

    const particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particleSystem);

    // Mouse move effect
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    // Animate loop
    function animate() {
      requestAnimationFrame(animate);
      particleSystem.rotation.y += 0.0005;
      particleSystem.rotation.x += 0.0005;
      camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
      camera.position.y += (mouseY * 2 - camera.position.y) * 0.02;
      camera.lookAt(scene.position);
      renderer.render(scene, camera);
    }
    animate();

    // Resize handle
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
