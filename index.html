<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NisanX Blog</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  color:#fff;
  font-family:'Courier New', monospace;
  overflow-x:hidden;
}

#bg-canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
}

header {
  position:relative; z-index:1;
  padding:15px 20px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid #0ff3;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.logo {
  display:flex; align-items:center; gap:12px;
}

.logo img {
  width:40px; height:40px;
  border-radius:50%;
  border:2px solid #0ff;
  box-shadow:0 0 15px #0ff;
}

.logo h2 { font-size:20px; }
.logo h2 span { color:#0ff; }

.header-right { display:flex; gap:10px; align-items:center; }

input {
  background:rgba(0,0,0,0.4);
  border:1px solid #0ff5;
  color:#fff;
  padding:8px;
  border-radius:6px;
  font-family:'Courier New', monospace;
}

button {
  background:transparent;
  border:1px solid #0ff;
  color:#0ff;
  padding:8px 16px;
  border-radius:6px;
  cursor:pointer;
  font-family:'Courier New', monospace;
  transition:0.3s;
  text-shadow:0 0 10px #0ff;
}
button:hover {
  background:rgba(0,255,255,0.1);
  box-shadow:0 0 20px #0ff;
}

#postsContainer {
  position:relative; z-index:1;
  max-width:900px;
  margin:30px auto;
  padding:0 20px;
}

.post {
  border:1px solid #0ff5;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(5px);
  animation:blink 3s infinite alternate;
}

.post:hover {
  border-color:#0ff;
  box-shadow:0 0 15px #0ff3;
}

.post h3 { color:#0ff; margin-bottom:10px; }

@keyframes blink {
 0% { opacity:1; }
 100% { opacity:0.8; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header>
  <div class="logo">
    <img src="NisanX.jpg" alt="Logo">
    <h2>NISAN<span>X</span> BLOG</h2>
  </div>
  <div class="header-right">
    <button id="loginBtn">LOGIN</button>
    <button id="logoutBtn" style="display:none;">LOGOUT</button>
  </div>
</header>

<main id="postsContainer">
  <p style="text-align:center; color:#666;">Loading posts...</p>
</main>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('bg-canvas'), alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 5;

const starCount = 1500;
const positions = new Float32Array(starCount * 3);
for(let i=0; i<starCount; i++) {
  positions[i*3] = (Math.random()-0.5)*25;
  positions[i*3+1] = (Math.random()-0.5)*25;
  positions[i*3+2] = (Math.random()-0.5)*25;
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const material = new THREE.PointsMaterial({ color:0x00ff00, size:0.05, transparent:true, opacity:0.8 });
const stars = new THREE.Points(geometry, material);
scene.add(stars);

function animate() {
  requestAnimationFrame(animate);
  stars.rotation.y += 0.0005;
  stars.rotation.x += 0.0002;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

<script type="module" src="app.js"></script>
</body>
</html>
