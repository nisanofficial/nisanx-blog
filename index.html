<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NisanX Blog</title>
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0ff3;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
    }

   .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

   .logo img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #0ff;
      box-shadow: 0 0 15px #0ff;
    }

   .logo h2 {
      font-size: 20px;
    }

   .logo h2 span {
      color: #0ff;
    }

   .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input, #editor {
      background: rgba(0,0,0,0.4);
      border: 1px solid #0ff5;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
    }

    input:focus {
      outline: none;
      border-color: #0ff;
      box-shadow: 0 0 10px #0ff;
    }

    /* Neon buttons - shudhu border */
    button {
      background: transparent;
      border: 1px solid #0ff;
      color: #0ff;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      transition: 0.3s;
      text-shadow: 0 0 10px #0ff;
    }
    button:hover {
      background: rgba(0,255,255,0.1);
      box-shadow: 0 0 20px #0ff;
      border-color: #0ff;
    }

    /* Posts */
    #postsContainer {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

   .post {
      border: 1px solid #0ff5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px);
      animation: blink 3s infinite alternate;
      transition: 0.3s;
    }

   .post:hover {
      border-color: #0ff;
      box-shadow: 0 0 15px #0ff3;
    }

   .post h3 {
      color: #0ff;
      margin-bottom: 10px;
    }

    /* Modal */
   .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      z-index: 10;
    }

   .modal-content {
      border: 1px solid #0ff;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 600px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px #0ff5;
    }

    @keyframes blink {
      0% { opacity: 1; }
      100% { opacity: 0.8; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <header>
    <div class="logo">
      <img src="NisanX.jpg" alt="Logo">
      <h2>NISAN<span>X</span> BLOG</h2>
    </div>
    <div class="header-right">
      <input type="text" id="searchBox" placeholder="Search posts...">
      <button id="loginBtn">LOGIN</button>
      <button id="uploadBtn" style="display:none;">UPLOAD</button>
      <button id="logoutBtn" style="display:none;">LOGOUT</button>
    </div>
  </header>

  <div id="uploadModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3 style="color:#0ff; margin-bottom:15px;">Create Post</h3>
      <input type="text" id="postTitle" placeholder="Title" style="width:100%; margin-bottom:10px;">
      <div id="editor" style="height:200px; margin-bottom:10px;"></div>
      <input type="file" id="imageUpload" accept="image/*" style="margin-bottom:10px;">
      <div style="display:flex; gap:10px;">
        <button id="submitPost">POST</button>
        <button onclick="closeModal()">CANCEL</button>
      </div>
    </div>
  </div>

  <main id="postsContainer"></main>

  <!-- Three.js -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('bg-canvas'),
      alpha: true,
      antialias: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.position.z = 5;

    // Star field
    const starCount = 1200;
    const positions = new Float32Array(starCount * 3);

    for(let i = 0; i < starCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 25;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 25;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 25;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
      color: 0x00ff00,
      size: 0.05,
      transparent: true,
      opacity: 0.8
    });

    const stars = new THREE.Points(geometry, material);
    scene.add(stars);

    function animate() {
      requestAnimationFrame(animate);
      stars.rotation.y += 0.0005;
      stars.rotation.x += 0.0002;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
